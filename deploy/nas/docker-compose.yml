services:
  proxy-tunnel:
    build:
      context: ./app
      dockerfile: deploy/nas/Dockerfile.tunnel
    image: pm-robot:ssh-tunnel
    container_name: pm-robot-proxy-tunnel
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./.env
    environment:
      PM_ROBOT_PROXY_LOCAL_HOST: ${PM_ROBOT_PROXY_LOCAL_HOST:-172.19.0.1}
      PM_ROBOT_PROXY_LOCAL_PORT: ${PM_ROBOT_PROXY_LOCAL_PORT:-18082}
      PM_ROBOT_PROXY_REMOTE_HOST: ${PM_ROBOT_PROXY_REMOTE_HOST:-127.0.0.1}
      PM_ROBOT_PROXY_REMOTE_PORT: ${PM_ROBOT_PROXY_REMOTE_PORT:-18081}
      PM_ROBOT_VPS_KEY_PATH: /ssh/id_ed25519_pmrobot_vps
      PM_ROBOT_PROXY_TUNNEL_LOG_PATH: /logs/vps-http-proxy-tunnel.log
    volumes:
      - ./ssh:/ssh:ro
      - ./logs:/logs

  web:
    build:
      context: ./app
      dockerfile: deploy/nas/Dockerfile
    image: pm-robot:nas
    container_name: pm-robot-web
    restart: unless-stopped
    env_file:
      - ./.env
    working_dir: /app
    command:
      - python
      - -m
      - pm_robot.cli
      - --env
      - /app/.env
      - web
      - --host
      - 0.0.0.0
      - --port
      - "8787"
    ports:
      - "8787:8787"
    volumes:
      - ./app/src:/app/src:ro
      - ./app/deploy:/app/deploy:ro
      - ./app/scripts:/app/scripts:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./reports:/app/reports
      - ./config:/app/config:ro

  pipeline-planner:
    build:
      context: ./app
      dockerfile: deploy/nas/Dockerfile
    image: pm-robot:nas
    container_name: pm-robot-pipeline-planner
    restart: unless-stopped
    env_file:
      - ./.env
    working_dir: /app
    command:
      - /bin/sh
      - /app/deploy/nas/wallet-pipeline-planner-loop.sh
    depends_on:
      - proxy-tunnel
    volumes:
      - ./app/src:/app/src:ro
      - ./app/deploy:/app/deploy:ro
      - ./app/scripts:/app/scripts:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./reports:/app/reports
      - ./config:/app/config:ro

  discovery-loop:
