global
    log stdout format raw local0
    maxconn 512

defaults
    log global
    mode tcp
    option dontlognull
    option tcplog
    timeout connect 10s
    timeout client 10m
    timeout server 10m
    timeout check 10s

frontend proxy_frontend
    bind "${PM_ROBOT_PROXY_LOCAL_HOST}:${PM_ROBOT_PROXY_LOCAL_PORT}"
    default_backend proxy_backends

frontend health
    bind 127.0.0.1:18085
    mode http
    http-request return status 200 content-type text/plain string ok if { nbsrv(proxy_backends) gt 0 }
    http-request return status 503 content-type text/plain string unavailable

backend proxy_backends
    option tcp-check
    tcp-check connect
    tcp-check send-binary 434f4e4e4543542077732d6c6976652d646174612e706f6c796d61726b65742e636f6d3a34343320485454502f312e310d0a486f73743a2077732d6c6976652d646174612e706f6c796d61726b65742e636f6d3a3434330d0a0d0a
    tcp-check expect string " 200 "
    default-server inter 5s fall 2 rise 2
    server primary "127.0.0.1:${PM_ROBOT_PROXY_PRIMARY_TUNNEL_PORT}" check
    server secondary "127.0.0.1:${PM_ROBOT_PROXY_SECONDARY_TUNNEL_PORT}" check backup
