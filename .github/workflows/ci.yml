name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -e .

      - name: Compile Python sources
        run: python -m compileall -q src tests

      - name: Run test suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest 2>&1 | tee "$RUNNER_TEMP/pytest.log"

      - name: Publish test failure summary
        if: failure()
        env:
          PYTEST_LOG: ${{ runner.temp }}/pytest.log
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          log_path = Path(os.environ["PYTEST_LOG"])
          lines = log_path.read_text(encoding="utf-8", errors="replace").splitlines()
          summary = "\n".join(lines[-80:])[-7000:]
          escaped = summary.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(f"::error file=.github/workflows/ci.yml,title=pytest failure::{escaped}")
          PY
