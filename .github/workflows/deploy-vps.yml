name: Deploy VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -e .
          python -m pytest

      - name: Check deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST" || (echo "Missing VPS_HOST secret" && exit 1)
          test -n "$VPS_USER" || (echo "Missing VPS_USER secret" && exit 1)
          test -n "$VPS_SSH_KEY" || (echo "Missing VPS_SSH_KEY secret" && exit 1)

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/pm_robot_deploy
          chmod 600 ~/.ssh/pm_robot_deploy
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync files to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/pm_robot_deploy -p ${VPS_PORT} -o StrictHostKeyChecking=yes" \
            --exclude '.git/' \
            --exclude '.venv/' \
            --exclude '.env' \
            --exclude 'data/' \
            --exclude 'logs/' \
            --exclude 'backups/' \
            --exclude 'reports/' \
            --exclude 'PolyHermes/' \
            --exclude 'polywhale/' \
            --exclude 'nautilus-trading/' \
            ./ "${VPS_USER}@${VPS_HOST}:/opt/pm-robot/"

      - name: Install and migrate on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/pm_robot_deploy -p "$VPS_PORT" -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" <<'REMOTE'
            set -euo pipefail
            cd /opt/pm-robot
            mkdir -p data logs backups reports config
            if [ ! -f .env ]; then
              cp deploy/env.example .env
            fi
            python3 -m venv .venv
            .venv/bin/python -m pip install --upgrade pip
            .venv/bin/python -m pip install -e .
            chmod +x deploy/scripts/*.sh
            cp deploy/systemd/*.service /etc/systemd/system/
            cp deploy/systemd/*.timer /etc/systemd/system/
            systemctl daemon-reload
            .venv/bin/python -m pm_robot.cli --env .env migrate
            .venv/bin/python -m pm_robot.cli --env .env health --out logs/health.json
            systemctl enable --now pm-robot-health.timer
            systemctl enable --now pm-robot-discover-activity.timer
            systemctl enable --now pm-robot-evidence-backfill.timer
            systemctl enable --now pm-robot-polyhermes-research-export.timer
            if [ -f /opt/polyhermes/.env ]; then
              systemctl enable --now pm-robot-polyhermes-research-push.timer
            fi
            systemctl reset-failed pm-robot-evidence-backfill.service || true
            systemctl reset-failed pm-robot-polyhermes-research-export.service || true
            systemctl reset-failed pm-robot-polyhermes-research-push.service || true
          REMOTE

      - name: Verify deployment
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/pm_robot_deploy -p "$VPS_PORT" -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" <<'REMOTE'
            set -euo pipefail
            cd /opt/pm-robot
            .venv/bin/python -m pm_robot.cli --env .env evidence-backfill-status
            systemctl is-enabled pm-robot-evidence-backfill.timer
            systemctl is-active pm-robot-evidence-backfill.timer
            systemctl is-enabled pm-robot-polyhermes-research-export.timer
            systemctl is-active pm-robot-polyhermes-research-export.timer
            if [ -f /opt/polyhermes/.env ]; then
              systemctl is-enabled pm-robot-polyhermes-research-push.timer
              systemctl is-active pm-robot-polyhermes-research-push.timer
            fi
          REMOTE
