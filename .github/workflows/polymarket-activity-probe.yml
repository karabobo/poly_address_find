name: Manual Polymarket Activity Probe

on:
  workflow_dispatch:
    inputs:
      pages:
        description: "Number of /trades pages to scan"
        required: false
        default: "8"
      page_limit:
        description: "Trades per page"
        required: false
        default: "100"
      min_trades:
        description: "Minimum trades per wallet"
        required: false
        default: "2"
      min_usdc_volume:
        description: "Minimum estimated USDC volume per wallet"
        required: false
        default: "20"

concurrency:
  group: polymarket-activity-probe
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Run probe
        env:
          PAGES: ${{ github.event.inputs.pages || '8' }}
          PAGE_LIMIT: ${{ github.event.inputs.page_limit || '100' }}
          MIN_TRADES: ${{ github.event.inputs.min_trades || '2' }}
          MIN_USDC_VOLUME: ${{ github.event.inputs.min_usdc_volume || '20' }}
        run: |
          mkdir -p artifacts
          python -m pm_robot.cli \
            --db /tmp/pm_robot_probe.sqlite \
            discover-activity \
            --pages "$PAGES" \
            --page-limit "$PAGE_LIMIT" \
            --min-trades "$MIN_TRADES" \
            --min-usdc-volume "$MIN_USDC_VOLUME" \
            --max-candidates 500 \
            --sleep 0.2 \
            --no-db-write \
            --out artifacts/polymarket-candidates.json

      - name: Upload candidate artifact
        uses: actions/upload-artifact@v4
        with:
          name: polymarket-candidates
          path: artifacts/polymarket-candidates.json
          retention-days: 7
